<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 Page</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Inter", sans-serif;
      }

      body {
        min-height: 100vh;
        background: #eef4f3;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 40px;
        overflow: hidden;
      }

      /* background cloud effect */
      body::before,
      body::after {
        content: "";
        position: absolute;
        width: 500px;
        height: 500px;
        background: radial-gradient(
          circle,
          rgba(255, 255, 255, 0.8),
          transparent 70%
        );
        z-index: 0;
      }

      body::before {
        top: -100px;
        left: -100px;
      }

      body::after {
        bottom: -100px;
        right: -100px;
      }

      .container {
        position: relative;
        width: 100%;
        max-width: 1250px;
        min-height: 820px;
        background: rgba(255, 255, 255, 0.92);
        border-radius: 8px;
        box-shadow: 0 8px 30px rgba(0, 0, 0, 0.05);
        padding: 30px 45px;
        overflow: hidden;
        z-index: 1;
      }

      /* NAVBAR */
      .navbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .logo {
        display: flex;
        align-items: center;
        gap: 12px;
        font-size: 18px;
        font-weight: 700;
        color: #111;
      }

      .logo-icon {
        width: 28px;
        height: 28px;
        background: #0b4f4a;
        border-radius: 7px;
        position: relative;
      }

      .logo-icon::before {
        content: "";
        position: absolute;
        width: 13px;
        height: 13px;
        background: #fff;
        border-radius: 4px;
        top: 7px;
        left: 7px;
        transform: rotate(45deg);
      }

      .nav-links {
        display: flex;
        gap: 35px;
        list-style: none;
      }

      .nav-links a {
        text-decoration: none;
        color: #333;
        font-size: 16px;
        font-weight: 500;
        transition: 0.3s;
      }

      .nav-links a:hover {
        color: #0b4f4a;
      }

      .nav-buttons {
        display: flex;
        gap: 15px;
      }

      .btn {
        border: none;
        padding: 12px 22px;
        border-radius: 12px;
        font-size: 15px;
        cursor: pointer;
        font-weight: 500;
        transition: 0.3s;
      }

      .btn-light {
        background: #fff;
        box-shadow: 0 3px 10px rgba(0, 0, 0, 0.08);
      }

      .btn-dark {
        background: #000;
        color: #fff;
      }

      /* MAIN CONTENT */
      .content {
        position: relative;
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-align: center;
        margin-top: 80px;
      }

      .big-404 {
        position: absolute;
        top: 10px;
        font-size: 340px;
        font-weight: 700;
        color: #84aba7;
        opacity: 0.75;
        line-height: 1;
        z-index: 0;
        user-select: none;
      }

      /* Fake clouds */
      .cloud {
        position: absolute;
        background: white;
        border-radius: 50px;
        opacity: 0.95;
        filter: blur(1px);
      }

      .cloud::before,
      .cloud::after {
        content: "";
        position: absolute;
        background: white;
        border-radius: 50%;
      }

      .cloud1 {
        width: 180px;
        height: 60px;
        top: 180px;
        left: 170px;
      }

      .cloud1::before {
        width: 70px;
        height: 70px;
        top: -30px;
        left: 20px;
      }

      .cloud1::after {
        width: 90px;
        height: 90px;
        top: -40px;
        right: 20px;
      }

      .cloud2 {
        width: 220px;
        height: 70px;
        top: 350px;
        right: 180px;
      }

      .cloud2::before {
        width: 80px;
        height: 80px;
        top: -35px;
        left: 25px;
      }

      .cloud2::after {
        width: 100px;
        height: 100px;
        top: -45px;
        right: 25px;
      }

      .text-content {
        position: relative;
        z-index: 2;
        margin-top: 320px;
      }

      .text-content h1 {
        font-size: 60px;
        font-weight: 600;
        color: #111;
        margin-bottom: 18px;
      }

      .text-content p {
        color: #888;
        font-size: 17px;
        margin-bottom: 35px;
      }

      .home-btn {
        background: #000;
        color: #fff;
        border: none;
        padding: 16px 35px;
        border-radius: 14px;
        font-size: 16px;
        cursor: pointer;
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
        transition: 0.3s;
      }

      .home-btn:hover {
        transform: translateY(-2px);
      }

      @media (max-width: 992px) {
        .nav-links {
          display: none;
        }

        .big-404 {
          font-size: 220px;
        }

        .text-content {
          margin-top: 240px;
        }

        .text-content h1 {
          font-size: 42px;
        }
      }

      @media (max-width: 600px) {
        body {
          padding: 15px;
        }

        .container {
          padding: 25px;
        }

        .navbar {
          flex-wrap: wrap;
          gap: 20px;
        }

        .big-404 {
          font-size: 140px;
          top: 80px;
        }

        .text-content {
          margin-top: 170px;
        }

        .text-content h1 {
          font-size: 32px;
        }

        .text-content p {
          font-size: 14px;
        }

        .cloud {
          display: none;
        }
      }
    </style>
  </head>

  <body>
    <div class="container">
      <!-- Navbar -->
      <nav class="navbar">
        <div class="logo">
          <div class="logo-icon"></div>
          <span>TripForge</span>
        </div>

        <ul class="nav-links">
          <li><a href="#">Overview</a></li>
          <li><a href="#">How it Works</a></li>
          <li><a href="#">Features</a></li>
          <li><a href="#">Pricing</a></li>
          <li><a href="#">Destination</a></li>
          <li><a href="#">FAQs</a></li>
        </ul>

        <div class="nav-buttons">
          <button class="btn btn-light">Sign Up</button>
          <button class="btn btn-dark">Sign In</button>
        </div>
      </nav>

      <!-- Main -->
      <section class="content">
        <div class="big-404">404</div>

        <div class="cloud cloud1"></div>
        <div class="cloud cloud2"></div>

        <div class="text-content">
          <h1>Sorry, that page could not be found</h1>

          <p>
            The requested page either doesn’t exist or you don’t have access to
            it.
          </p>

          <button class="home-btn">Go Back Home</button>
        </div>
      </section>
    </div>
  </body>
</html>
