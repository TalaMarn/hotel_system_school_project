<!doctype html>
<html lang="en">
  {% load static %}
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Arthy Hotel</title>
    <link rel="icon" type="image/png" href="{% static 'photos/Logo.png' %}" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
  </head>
  <style>
    body {
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background-color: #161617;
    }
    .navbar {
      background-color: #343434 !important; /* Use your hex code */
    }
    .hero-section {
      padding: 20px;
      background: #343434;
      color: #e6b31e;
      border-radius: 10px;
      margin-top: 30px;
    }
    .hero-section h1 {
      font-size: 2.5rem;
      font-weight: bold;
    }
    .hero-section p {
      font-size: 1.2rem;
      margin-top: 20px;
    }
    .room-section {
      padding: 20px;
      background: #343434;
      color: #e6b31e;
      border-radius: 10px;
      margin-top: 30px;
    }
    .card {
      background-color: #282828;
      color: #e6b31e;
      border: none;
    }
  </style>
  <body>
    {% include 'navbar.html' %}

    <!-- Hero Section -->

    <!-- Footer -->
    <footer class="text-center mt-5 mb-3" style="color: #e6b31e">
      &copy; 2026 Arthy Hotel. All rights reserved.
      <br />
      <a href="#" style="color: #e6b31e">Privacy Policy</a> |
      <a href="#" style="color: #e6b31e">Terms of Service</a>
    </footer>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
