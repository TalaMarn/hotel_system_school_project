<!doctype html>
<html lang="en">
  {% load static %}
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Login - Arthy Hotel</title>
    <link rel="icon" type="image/png" href="{% static 'photos/Logo.png' %}" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"
      rel="stylesheet"
    />

    <style>
      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background-color: #161617;
        color: #e6b31e;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .login-container {
        background-color: #343434;
        padding: 40px;
        border-radius: 10px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
        width: 100%;
        max-width: 400px;
        text-align: center;
      }
      .form-control {
        background-color: #282828;
        border: 1px solid #444;
        color: #e6b31e;
      }
      .form-control:focus {
        background-color: #2d2d2d;
        color: #e6b31e;
        border-color: #e6b31e;
        box-shadow: 0 0 0 0.25rem rgba(230, 179, 30, 0.25);
      }
      .btn-warning {
        background-color: #e6b31e;
        border: none;
        font-weight: bold;
      }
      .btn-warning:hover {
        background-color: #c99c1a;
      }
      a {
        color: #e6b31e;
        text-decoration: none;
      }
      a:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <div class="login-container">
      <img
        src="{% static 'photos/Logo.png' %}"
        alt="Hotel Logo"
        width="120"
        class="mb-4"
      />
      <h2 class="mb-4">Login</h2>
      {% if messages %}
      <div class="mb-3 text-start">
        {% for message in messages %}
        <div class="alert alert-{{ message.tags }}" role="alert">
          {{ message }}
        </div>
        {% endfor %}
      </div>
      {% endif %}
      <form method="POST">
        {% csrf_token %}
        <div class="mb-3 text-start">
          <label for="username" class="form-label">Username</label>
          <div class="input-group">{{ form.username }}</div>
        </div>
        <div class="mb-4 text-start">
          <label for="password" class="form-label">Password</label>
          <div class="input-group">{{ form.password }}</div>
        </div>
        <button type="submit" class="btn btn-warning w-100 mb-3">
          Sign In
        </button>
      </form>
      <p class="small">
        Don't have an account? <a href="{% url 'register' %}">Register here</a>
      </p>
      <p class="small"><a href="{% url 'hotel_welcome' %}">Back to Home</a></p>
    </div>
  </body>
</html>
