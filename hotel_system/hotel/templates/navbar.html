{% load static %}

<nav class="navbar navbar-expand-lg bg-body-tertiary">
  <div class="container-fluid">
    <img
      src="{% static 'photos/Logo.png' %}"
      alt="Hotel Logo"
      width="63"
      height="42"
      class="d-inline-block align-text-top"
    />
    <a
      class="navbar-brand"
      href="{% url 'customer_dashboard' %}"
      style="color: #e6b31e"
      >Arthy Hotel</a
    >
    <button
      class="navbar-toggler"
      type="button"
      data-bs-toggle="collapse"
      data-bs-target="#navbarSupportedContent"
      aria-controls="navbarSupportedContent"
      aria-expanded="false"
      aria-label="Toggle navigation"
    >
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarSupportedContent">
      <ul class="navbar-nav me-auto mb-2 mb-lg-0">
        <li class="nav-item">
          <a
            class="nav-link {% if request.resolver_match.url_name == 'customer_dashboard' %}active{% endif %}"
            href="{% url 'customer_dashboard' %}"
            style="color: {% if request.resolver_match.url_name == 'customer_dashboard' %}#e6b31e{% else %}#e6b41ea3{% endif %}"
            >Home</a
          >
        </li>
        <li class="nav-item">
          <a
            class="nav-link {% if request.resolver_match.url_name == 'room_list' %}active{% endif %}"
            href="{% url 'room_list' %}"
            style="color: {% if request.resolver_match.url_name == 'room_list' %}#e6b31e{% else %}#e6b41ea3{% endif %}"
            >Rooms</a
          >
        </li>
        {% if user.is_staff %}
        <li class="nav-item dropdown">
          <a
            class="nav-link dropdown-toggle"
            href="#"
            role="button"
            data-bs-toggle="dropdown"
            aria-expanded="false"
          >
            More..
          </a>
          <ul class="dropdown-menu">
            <li>
              <a class="dropdown-item" href="{% url 'add_room' %}">Add Room</a>
            </li>
            <li>
              <a class="dropdown-item" href="{% url 'room_list' %}"
                >View Rooms</a
              >
            </li>
            <li><hr class="dropdown-divider" /></li>
            <li>
              <a class="dropdown-item" href="{% url 'staff_dashboard' %}"
                >Dashboard</a
              >
            </li>
          </ul>
        </li>
        {% else %}
        <li class="nav-item">
          <a
            class="nav-link {% if request.resolver_match.url_name == 'history' %}active{% endif %}"
            href="{% url 'history' %}"
            style="color: {% if request.resolver_match.url_name == 'history' %}#e6b31e{% else %}#e6b41ea3{% endif %}"
            >Booking History</a
          >
        </li>
        {% endif %}
      </ul>
      {% if user.is_authenticated %}
      <span class="nav-link m-2 mb-0 mt-0" style="color: #e6b31e"
        >Hi, {{ user.username }}</span
      >
      <a class="btn btn-warning" href="{% url 'logout' %}">Logout</a>
      {% else %}
      <a
        class="btn btn-warning-outline m-2 mb-0 mt-0"
        href="{% url 'login' %}"
        style="color: #e6b31e"
        >Login</a
      >
      <a class="btn btn-warning" href="{% url 'register' %}">Register</a>
      {% endif %}
    </div>
  </div>
</nav>
