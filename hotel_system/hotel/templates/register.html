<!doctype html>
<html lang="en">
  {% load static %}
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Register - Arthy Hotel</title>
    <link rel="icon" type="image/png" href="{% static 'photos/Logo.png' %}" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background-color: #161617;
        color: #e6b31e;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px 0;
      }
      .register-container {
        background-color: #343434;
        padding: 40px;
        border-radius: 10px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
        width: 100%;
        max-width: 500px;
        text-align: center;
      }
      .form-control,
      .form-select {
        background-color: #282828;
        border: 1px solid #444;
        color: #e6b31e;
      }
      .form-control:focus,
      .form-select:focus {
        background-color: #2d2d2d;
        color: #e6b31e;
        border-color: #e6b31e;
        box-shadow: 0 0 0 0.25rem rgba(230, 179, 30, 0.25);
      }
      .btn-warning {
        background-color: #e6b31e;
        border: none;
        font-weight: bold;
      }
      .btn-warning:hover {
        background-color: #c99c1a;
      }
      a {
        color: #e6b31e;
        text-decoration: none;
      }
      a:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <div class="register-container">
      <img
        src="{% static 'photos/Logo.png' %}"
        alt="Hotel Logo"
        width="100"
        class="mb-3"
      />
      <h2 class="mb-4">Create Account</h2>
      {% if messages %}
      <div class="mb-3 text-start">
        {% for message in messages %}
        <div class="alert alert-{{ message.tags }}" role="alert">
          {{ message }}
        </div>
        {% endfor %}
      </div>
      {% endif %}
      <form method="POST">
        {% csrf_token %}
        <div class="row">
          <div class="col-md-6 mb-3 text-start">
            <label for="username" class="form-label">Username</label>
            <input
              type="text"
              name="username"
              class="form-control"
              id="username"
              required
            />
          </div>
          <div class="col-md-6 mb-3 text-start">
            <label for="email" class="form-label">Email</label>
            <input
              type="email"
              name="email"
              class="form-control"
              id="email"
              required
            />
          </div>
        </div>
        <div class="mb-3 text-start">
          <label for="role" class="form-label">Register as</label>
          <select name="role" class="form-select" id="role">
            <option value="customer">Customer</option>
            <option value="staff">Hotel Staff</option>
          </select>
        </div>
        <div class="mb-3 text-start">
          <label for="password" class="form-label">Password</label>
          <input
            type="password"
            name="password"
            class="form-control"
            id="password"
            required
          />
        </div>
        <div class="mb-4 text-start">
          <label for="confirm_password" class="form-label"
            >Confirm Password</label
          >
          <input
            type="password"
            name="confirm_password"
            class="form-control"
            id="confirm_password"
            required
          />
        </div>
        <button type="submit" class="btn btn-warning w-100 mb-3">
          Register
        </button>
      </form>
      <p class="small">
        Already have an account? <a href="{% url 'login' %}">Login here</a>
      </p>
      <p class="small">
        <a href="{% url 'customer_dashboard' %}">Back to Home</a>
      </p>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
